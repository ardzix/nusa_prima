<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Transformer body -->
  <rect x="20" y="45" width="80" height="85" rx="4" fill="#B0B8C4" stroke="#8A94A2" stroke-width="2"/>
  <!-- Cooling fins left -->
  <rect x="10" y="55" width="8" height="65" rx="3" fill="#C8CED6" stroke="#8A94A2" stroke-width="1.5"/>
  <rect x="2" y="60" width="8" height="55" rx="3" fill="#D4D9E0" stroke="#8A94A2" stroke-width="1.5"/>
  <!-- Cooling fins right -->
  <rect x="102" y="55" width="8" height="65" rx="3" fill="#C8CED6" stroke="#8A94A2" stroke-width="1.5"/>
  <rect x="110" y="60" width="8" height="55" rx="3" fill="#D4D9E0" stroke="#8A94A2" stroke-width="1.5"/>
  <!-- Horizontal lines on body -->
  <line x1="28" y1="65" x2="92" y2="65" stroke="#9AA3AD" stroke-width="1.2"/>
  <line x1="28" y1="78" x2="92" y2="78" stroke="#9AA3AD" stroke-width="1.2"/>
  <line x1="28" y1="91" x2="92" y2="91" stroke="#9AA3AD" stroke-width="1.2"/>
  <line x1="28" y1="104" x2="92" y2="104" stroke="#9AA3AD" stroke-width="1.2"/>
  <line x1="28" y1="117" x2="92" y2="117" stroke="#9AA3AD" stroke-width="1.2"/>
  <!-- Top plate -->
  <rect x="18" y="40" width="84" height="8" rx="2" fill="#9AA3AD" stroke="#7D8794" stroke-width="1.5"/>
  <!-- Bushings (3 insulators on top) -->
  <!-- Left bushing -->
  <g transform="translate(35, 0)">
    <rect x="-3" y="18" width="6" height="24" rx="2" fill="#8A94A2" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="14" r="5" fill="#8A94A2" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="8" r="4" fill="#9AA3AD" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="3" r="3" fill="#B0B8C4" stroke="#6B7580" stroke-width="1"/>
  </g>
  <!-- Center bushing -->
  <g transform="translate(60, 0)">
    <rect x="-3" y="18" width="6" height="24" rx="2" fill="#8A94A2" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="14" r="5" fill="#8A94A2" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="8" r="4" fill="#9AA3AD" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="3" r="3" fill="#B0B8C4" stroke="#6B7580" stroke-width="1"/>
  </g>
  <!-- Right bushing -->
  <g transform="translate(85, 0)">
    <rect x="-3" y="18" width="6" height="24" rx="2" fill="#8A94A2" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="14" r="5" fill="#8A94A2" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="8" r="4" fill="#9AA3AD" stroke="#6B7580" stroke-width="1"/>
    <circle cx="0" cy="3" r="3" fill="#B0B8C4" stroke="#6B7580" stroke-width="1"/>
  </g>
</svg>
